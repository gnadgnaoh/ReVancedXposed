name: Android CI

on:
  push:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true

    - name: set up JDK
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Write key
      env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          K_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          K_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
      run: |
          echo "$KEYSTORE_B64" | tr -d '\r\n ' | base64 -d > release.jks
          
          printf "KEYSTORE_PASSWORD=%s\n" "$K_PASS" > signing.properties
          printf "KEYSTORE_ALIAS=%s\n" "$K_ALIAS" >> signing.properties
          printf "KEYSTORE_ALIAS_PASSWORD=%s\n" "$K_PASS" >> signing.properties
          printf "KEYSTORE_FILE=../release.jks\n" >> signing.properties

    - name: Build Debug
      run: ./gradlew assembleDebug

    - name: Build Release
      run: ./gradlew assembleRelease

    - name: Upload a Debug Artifact
      uses: actions/upload-artifact@v7
      with:
        name: nexalloy-ci-debug-apk
        path: app/build/outputs/apk/debug

    - name: Upload a Release Artifact
      uses: actions/upload-artifact@v7
      with:
        name: nexalloy-ci-release-apk
        path: |
          app/build/outputs/apk/release
          app/build/outputs/mapping/release/mapping.txt

    - name: Create AutoBuild Release
      run: |
        LATEST_REL=$(gh release view --json tagName -q .tagName 2>/dev/null || echo "")
        GIT_DESCRIBE=$(git rev-parse --short HEAD)
        
        cd app/build/outputs/apk/release/
        mv app-release.apk NexAlloy-${GIT_DESCRIBE}.apk
        
        gh release delete autobuild --yes || true
        
        if [ -z "$LATEST_REL" ]; then
          NOTES="Nightly build from commit ${GIT_DESCRIBE}"
        else
          NOTES="Nightly build from commit ${GIT_DESCRIBE}. See changes: https://github.com/${{ github.repository }}/compare/${LATEST_REL}...main"
        fi

        gh release create autobuild NexAlloy-${GIT_DESCRIBE}.apk \
          --prerelease \
          --title "Nightly Build ${GIT_DESCRIBE}" \
          --notes "$NOTES"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
