name: Android Release CI

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Keystore (Secure Mode)
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          K_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          K_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
        run: |
          echo "$KEYSTORE_B64" | tr -d '\r\n ' | base64 -d > release.jks
          
          printf "KEYSTORE_PASSWORD=%s\n" "$K_PASS" > signing.properties
          printf "KEYSTORE_ALIAS=%s\n" "$K_ALIAS" >> signing.properties
          printf "KEYSTORE_ALIAS_PASSWORD=%s\n" "$K_PASS" >> signing.properties
          printf "KEYSTORE_FILE=../release.jks\n" >> signing.properties

      - name: Build Release APK
        run: ./gradlew assembleUniversalRelease

      - name: Create or Update GitHub Release
        run: |
          cd app/build/outputs/apk/universal/release/
          
          TAG_NAME="${{ github.ref_name }}"
          if [ "${{ github.ref_type }}" != "tag" ]; then
            TAG_NAME="manual-build"
          fi
          
          APP_NAME="ReVancedXposed-${TAG_NAME}.apk"
          mv *.apk "$APP_NAME"

          gh release create "$TAG_NAME" "$APP_NAME" \
            --title "Release $TAG_NAME" \
            --notes "Automated secure build" \
            --prerelease || echo "Release already exists."

          gh release upload "$TAG_NAME" "$APP_NAME" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
