name: Android Release CI

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true

    - name: set up JDK
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Write key
      env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          K_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          K_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
      run: |
          echo "$KEYSTORE_B64" | tr -d '\r\n ' | base64 -d > release.jks
          
          printf "KEYSTORE_PASSWORD=%s\n" "$K_PASS" > signing.properties
          printf "KEYSTORE_ALIAS=%s\n" "$K_ALIAS" >> signing.properties
          printf "KEYSTORE_ALIAS_PASSWORD=%s\n" "$K_PASS" >> signing.properties
          printf "KEYSTORE_FILE=../release.jks\n" >> signing.properties

    - name: Build Release
      run: ./gradlew assembleRelease

    - run: |
          cd app/build/outputs/apk/release/
          TAG_NAME="v${{ github.run_number }}"
          mv app-release.apk NexAlloy-${TAG_NAME}.apk
        
          gh release create "$TAG_NAME" NexAlloy-${TAG_NAME}.apk --title "Release $TAG_NAME" --prerelease
      env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
